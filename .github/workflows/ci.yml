name: CI

on:
  push:
    branches: [master, main]
    paths:
      - 'yolo-backend/**'
  pull_request:
    branches: [master, main]
    paths:
      - 'yolo-backend/**'

defaults:
  run:
    working-directory: yolo-backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.11
      - run: uv sync
      - run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.11
      - run: uv sync
      - run: make test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t yolo-backend .
